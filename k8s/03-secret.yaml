---
# Secret for sensitive configuration
# WARNING: Store securely in production!
# In production, use: AWS Secrets Manager, Vault, Sealed Secrets, or similar
# 
# To create this secret:
# kubectl create secret generic auth-service-secrets \
#   --from-literal=DB_USERNAME=auth_user \
#   --from-literal=DB_PASSWORD=$(openssl rand -base64 32) \
#   --from-literal=SECRET_KEY_BASE=$(rails secret) \
#   --from-literal=DEVISE_JWT_SECRET_KEY=$(openssl rand -base64 32) \
#   -n auth-service

apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secrets
  namespace: auth-service
  labels:
    app: auth-service
    component: secret
type: Opaque
stringData:
  # Database Credentials
  # IMPORTANT: Change these in production!
  DB_USERNAME: "auth_user"
  DB_PASSWORD: "change_me_to_secure_password_in_production"
  
  # Rails Secret Key (Generate with: rails secret)
  SECRET_KEY_BASE: "change_me_to_secure_random_key_from_rails_secret"
  
  # JWT Secret Key (Generate with: openssl rand -base64 32)
  DEVISE_JWT_SECRET_KEY: "change_me_to_secure_random_jwt_secret"
  
  # SMTP Configuration (for password resets)
  SMTP_ADDRESS: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USERNAME: "your-email@gmail.com"
  SMTP_PASSWORD: "your-app-specific-password"
