---
# ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: auth-service
  labels:
    app: auth-service
    component: config
data:
  RAILS_ENV: production
  RAILS_LOG_TO_STDOUT: "true"
  RAILS_SERVE_STATIC_FILES: "true"
  RACK_ENV: production
  
  # Database Configuration
  DB_HOST: "auth-service-mysql"
  DB_PORT: "3306"
  DB_NAME: "auth_service_production"
  
  # Application Server
  WEB_CONCURRENCY: "4"
  RAILS_MAX_THREADS: "16"
  
  # Redis (if using)
  REDIS_URL: "redis://auth-service-redis:6379/0"
  
  # CORS Configuration
  CORS_ALLOWED_ORIGINS: "yourdomain.com,yourdomain.com:3000,yourdomain.com:3001"
  
  # Logging
  LOG_LEVEL: "info"
  
  # Asset Pipeline
  RAILS_ASSET_COMPRESSION: "true"

  # ── AWS / IRSA ────────────────────────────────────────────────────────────
  # AWS_REGION is read by the AWS SDK via the env var in 06-application.yaml.
  # S3_BUCKET_NAME is used by app/services/s3_service.rb.
  # No access keys here — credentials come from the IRSA projected token.
  AWS_REGION: "us-east-1"
  S3_BUCKET_NAME: "your-actual-app-s3-bucket"
