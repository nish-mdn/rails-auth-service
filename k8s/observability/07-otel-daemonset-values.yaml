mode: daemonset

presets:
  logsCollection:
    enabled: true
    includeCollectorLogs: false
    storeCheckpoints: true
  kubernetesAttributes:
    enabled: true
    extractAllPodLabels: true
    extractAllPodAnnotations: false
  kubeletMetrics:
    enabled: true

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

  processors:
    k8sattributes:
      extract:
        metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.node.name
          - k8s.container.name
          - k8s.deployment.name
          - k8s.replicaset.name
        labels:
          - tag_name: app
            key: app
            from: pod
          - tag_name: component
            key: component
            from: pod

    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25

    batch:
      send_batch_size: 1024
      send_batch_max_size: 2048
      timeout: 5s

    resource:
      attributes:
        - key: k8s.cluster.name
          value: "self-managed-aws"
          action: upsert

  exporters:
    otlphttp/loki:
      endpoint: http://loki-gateway.observability.svc:80/otlp
      tls:
        insecure: true

    prometheusremotewrite/vm:
      endpoint: http://victoriametrics-victoria-metrics-single-server.observability.svc:8428/api/v1/write
      resource_to_telemetry_conversion:
        enabled: true

    otlp/tempo:
      endpoint: tempo.observability.svc:4317
      tls:
        insecure: true

  service:
    pipelines:
      logs:
        receivers: [filelog]
        processors: [k8sattributes, resource, memory_limiter, batch]
        exporters: [otlphttp/loki]

      metrics:
        receivers: [otlp]
        processors: [k8sattributes, resource, memory_limiter, batch]
        exporters: [prometheusremotewrite/vm]

      traces:
        receivers: [otlp]
        processors: [k8sattributes, resource, memory_limiter, batch]
        exporters: [otlp/tempo]

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

serviceAccount:
  create: true

clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "namespaces", "nodes", "nodes/proxy", "services", "endpoints"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["apps"]
      resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
      verbs: ["get", "list", "watch"]

tolerations:
  - operator: Exists

extraVolumes:
  - name: varlogpods
    hostPath:
      path: /var/log/pods

extraVolumeMounts:
  - name: varlogpods
    mountPath: /var/log/pods
    readOnly: true

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    hostPort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    hostPort: 4318
    protocol: TCP
