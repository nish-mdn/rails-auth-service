deploymentMode: SingleBinary

loki:
  auth_enabled: false

# FIX 1: This disables the crashing 'loki-sc-rules' container
sidecar:
  enabled: false
  rules:
    enabled: false

# FIX 2: Ensure memberlist doesn't keep spamming DNS errors
  memberlist:
    join_members:
      - 127.0.0.1

  storage:
    type: filesystem

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  limits_config:
    retention_period: 48h
    max_query_length: 72h
    max_query_parallelism: 16
    ingestion_rate_mb: 10
    ingestion_burst_size_mb: 20
    per_stream_rate_limit: 5MB
    per_stream_rate_limit_burst: 15MB

  compactor:
    retention_enabled: true
    delete_request_store: filesystem

  otlp:
    resource_attributes:
      attributes_config:
        - action: index_label
          attributes:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.container.name
            - service.name
            - service.namespace

# SingleBinary mode — one pod does everything
singleBinary:
  replicas: 1
  persistence:
    size: 3Gi
    storageClass: "obs-ebs-gp3"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# Disable SimpleScalable components (not needed in SingleBinary mode)
write:
  replicas: 0
read:
  replicas: 0
backend:
  replicas: 0

gateway:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false

test:
  enabled: false
