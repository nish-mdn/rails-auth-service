---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
          ports:
            - containerPort: 9093
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: storage
              mountPath: /alertmanager
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: observability
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: observability
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'madhantry@gmail.com'
      smtp_auth_username: 'madhantry@gmail.com'
      smtp_auth_password: 'YOUR_GMAIL_APP_PASSWORD'
      smtp_require_tls: true

    route:
      receiver: 'email-default'
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

      routes:
        - receiver: 'email-critical'
          match:
            severity: critical
          continue: true

    receivers:
      - name: 'email-default'
        email_configs:
          - to: 'madhantry@gmail.com'
            send_resolved: true
            headers:
              Subject: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'

      - name: 'email-critical'
        email_configs:
          - to: 'madhantry@gmail.com'
            send_resolved: true
            headers:
              Subject: '[CRITICAL] {{ .GroupLabels.alertname }} - {{ .GroupLabels.namespace }}'

      # Uncomment below to enable Slack when ready:
      # - name: 'slack-alerts'
      #   slack_configs:
      #     - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
      #       channel: '#alerts'
      #       title: '{{ .GroupLabels.alertname }}'
      #       text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
